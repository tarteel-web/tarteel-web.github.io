<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>تتبع تلاوة القرآن</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e1a12;
      --surface: #162019;
      --surface2: #1e2d22;
      --border: #2a4030;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --gold-dim: #7a6030;
      --green: #4caf7a;
      --text: #e8dcc8;
      --text-dim: #8a9a88;
      --not-done-color: #3a5040;
      --done-color: #e8dcc8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Amiri', serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .logo { font-size: 22px; font-weight: 700; color: var(--gold); }
    .logo span { color: var(--text-dim); font-size: 14px; font-weight: 400; margin-right: 10px; }
    .nav-controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .page-nav {
      display: flex; align-items: center; gap: 6px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 6px 10px;
    }
    .page-nav button {
      background: none; border: none; color: var(--gold);
      cursor: pointer; font-size: 20px; padding: 2px 8px;
      border-radius: 6px; transition: background 0.2s; line-height: 1;
    }
    .page-nav button:hover { background: var(--border); }
    .page-nav button:disabled { color: var(--gold-dim); cursor: default; }
    #pageLabel { font-size: 15px; color: var(--text); min-width: 90px; text-align: center; }
    select {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); border-radius: 8px; padding: 7px 10px;
      font-family: 'Amiri', serif; font-size: 14px; cursor: pointer;
    }
    .controls-bar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 10px 24px; display: flex; align-items: center;
      gap: 12px; flex-wrap: wrap;
    }
    .btn {
      padding: 9px 18px; border: none; border-radius: 10px;
      cursor: pointer; font-family: 'Amiri', serif; font-size: 15px;
      font-weight: 700; transition: all 0.2s;
    }
    .btn-primary { background: var(--gold); color: #0e1a12; }
    .btn-primary:hover { background: var(--gold-light); }
    .btn-primary.listening { background: var(--green); color: #0e1a12; animation: pulse 1.5s infinite; }
    .btn-stop {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-stop:hover { border-color: var(--gold); color: var(--gold); }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(76,175,122,0.5); }
      50% { box-shadow: 0 0 0 10px rgba(76,175,122,0); }
    }
    .status-pill {
      padding: 5px 14px; border-radius: 20px; font-size: 13px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text-dim); margin-right: auto;
    }
    .status-pill.active { border-color: var(--green); color: var(--green); }
    .status-pill.error  { border-color: #ef4444; color: #ef4444; }
    .tashkeel-toggle {
      display: flex; align-items: center; gap: 8px;
      font-size: 14px; color: var(--text-dim); cursor: pointer;
    }
    .tashkeel-toggle input { accent-color: var(--gold); cursor: pointer; }
    main {
      flex: 1; padding: 32px 24px;
      max-width: 860px; margin: 0 auto; width: 100%;
    }
    .page-header { text-align: center; margin-bottom: 24px; }
    .sura-badge {
      display: inline-block; background: var(--surface2);
      border: 1px solid var(--gold-dim); color: var(--gold);
      padding: 4px 20px; border-radius: 20px; font-size: 16px; margin-bottom: 6px;
    }
    .ayah-range { font-size: 13px; color: var(--text-dim); }
    .ayat-container {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 28px 36px;
      line-height: 2.6; text-align: justify;
    }
    .word {
      font-family: 'Amiri Quran', 'Amiri', serif;
      font-size: 26px;
      color: var(--not-done-color);
      padding: 1px 3px;
      border-radius: 6px;
      transition: all 0.15s ease;
    }
    .word.done { color: var(--done-color); }
    .word.current {
      color: var(--gold-light);
      background: rgba(201,168,76,0.2);
      box-shadow: 0 0 14px 3px rgba(201,168,76,0.25);
      display: inline-block;
      transform: scale(1.06);
    }
    .ayah-marker {
      font-family: 'Amiri', serif;
      font-size: 18px;
      color: var(--gold-dim);
      margin: 0 4px;
    }
    .progress-bar {
      margin-top: 18px; height: 3px;
      background: var(--surface2); border-radius: 2px; overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold-dim), var(--gold));
      transition: width 0.3s ease; border-radius: 2px;
    }
    .loading {
      text-align: center; padding: 60px 20px;
      color: var(--text-dim); font-size: 18px;
    }

    @media(max-width: 600px) {
      .word {
        font-size: 18px;
      }

      .ayah-marker {
        font-size: 14px;
      }

      .ayat-container {
        line-height: 1.6;
        word-spacing: -6px;
      }
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <div class="logo">☽ تلاوة <span>تتبع القراءة</span></div>
  <div class="nav-controls">
    <select id="suraSelect"></select>
    <div class="page-nav">
      <button id="prevPage" title="الصفحة السابقة">›</button>
      <span id="pageLabel">صفحة 1</span>
      <button id="nextPage" title="الصفحة التالية">‹</button>
    </div>
  </div>
</header>

<div class="controls-bar">
  <button class="btn btn-primary" id="startBtn">🎤 ابدأ التلاوة</button>
  <button class="btn btn-stop" id="stopBtn">⏹ توقف</button>
  <label class="tashkeel-toggle">
    <input type="checkbox" id="tashkeelToggle" checked>
    التشكيل
  </label>
  <label class="tashkeel-toggle">
    <input type="checkbox" id="hideToggle">
    إخفاء الآيات
  </label>
  <div class="status-pill" id="statusPill">جاهز</div>
</div>

<main>
  <div class="page-header">
    <div class="sura-badge" id="suraLabel">—</div>
    <div class="ayah-range" id="ayahRange"></div>
  </div>
  <div class="ayat-container" id="ayatContainer">
    <div class="loading">جاري تحميل البيانات...</div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
</main>

<script>
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

let quranT = null, quranN = null, pages = null, soarNames = null, phoneticMap = {};
let currentPage = 0;
let words = [];        // [{display, norm, isMarker, ayah, sura}]
let currentIndex = -1;
let recognizer = null;
let showTashkeel = true;
let hideWords = false;

// ── Load JSON files ──
async function loadData() {
  try {
    [quranT, quranN, pages, soarNames] = await Promise.all([
      fetch('./القرآن كتابة/whole_quran_tashkeel.json').then(r => r.json()),
      fetch('./القرآن كتابة/whole_quran_no_tashkeel.json').then(r => r.json()),
      fetch('./القرآن كتابة/pages.json').then(r => r.json()),
      fetch('./القرآن كتابة/soar_names.json').then(r => r.json()),
    ]);
  // اختياري — لو الملف مش موجود مش هيكسر
  try { phoneticMap = await fetch('./القرآن كتابة/phonetic_transcription.json').then(r => r.json()); } catch(e) {}
    buildSuraSelect();
    renderPage(0);
  } catch(e) {
    document.getElementById('ayatContainer').innerHTML =
      '<div class="loading" style="color:#ef4444">خطأ في تحميل الملفات — تأكد إن الملفات في نفس المجلد مع index.html</div>';
  }
}

function buildSuraSelect() {
  const sel = document.getElementById('suraSelect');
  soarNames.forEach((name, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `${i+1}. ${name}`;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', () => {
    const suraName = soarNames[+sel.value];
    const idx = pages.findIndex(p => p.from_sura === suraName);
    if (idx !== -1) renderPage(idx);
  });
}

// ── Arabic normalization ──
function normalizeAr(text) {
  return text
    .replace(/[\u0610-\u061A\u064B-\u065F\u06D6-\u06ED\u0670]/g, '')
    .replace(/[ًٌٍَُِّْـ]/g, '')
    .replace(/[ٱإأآا]/g, 'ا')
    .replace(/ى/g, 'ي')
    .replace(/ؤ/g, 'و')
    .replace(/ئ/g, 'ي')
    .replace(/ة/g, 'ه')
    .replace(/[﴾﴿٠-٩]/g, '')
    .trim();
}

function getWordNorm(w) {
  const base = normalizeAr(w.norm || w.display);
  return phoneticMap[base] ? normalizeAr(phoneticMap[base]) : base;
}

function toArabicNum(n) {
  return String(n).replace(/\d/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);
}

// ── Build flat word list for a page ──
function buildWords(pageIdx) {
  const pg = pages[pageIdx];
  const result = [];
  let inRange = false;

  for (const sura of soarNames) {
    const tLines = quranT[sura];
    const nLines = quranN[sura];
    if (!tLines) continue;

    for (let a = 0; a < tLines.length; a++) {
      const ayahNum = a + 1;
      if (sura === pg.from_sura && ayahNum === pg.from_ayah) inRange = true;
      if (!inRange) continue;

      const lineT = tLines[a].replace(/﴿[٠-٩]+﴾/, '').trim();
      const lineN = nLines[a].replace(/﴿[٠-٩]+﴾/, '').trim();
      const wT = lineT.split(/\s+/).filter(Boolean);
      const wN = lineN.split(/\s+/).filter(Boolean);

      for (let w = 0; w < wT.length; w++) {
        result.push({
          display: wT[w],
          norm: normalizeAr(wN[w] || wT[w]),
          ayah: ayahNum,
          sura,
          isMarker: false,
        });
      }
      // ayah number marker
      result.push({
        display: `﴿${toArabicNum(ayahNum)}﴾`,
        norm: null,
        ayah: ayahNum,
        sura,
        isMarker: true,
      });

      if (sura === pg.to_sura && ayahNum === pg.to_ayah) {
        inRange = false;
        break;
      }
    }
    if (!inRange && result.length > 0) break;
  }
  return result;
}

// ── Render page ──
function renderPage(pageIdx, keepListening = false) {
  stopRecognition(keepListening);
  currentPage = pageIdx;
  currentIndex = -1;
  words = buildWords(pageIdx);

  const pg = pages[pageIdx];
  document.getElementById('pageLabel').textContent = `صفحة ${pageIdx + 1}`;
  document.getElementById('suraLabel').textContent =
    pg.from_sura === pg.to_sura ? pg.from_sura : `${pg.from_sura} ← ${pg.to_sura}`;
  document.getElementById('ayahRange').textContent =
    `${pg.from_sura} — آية ${toArabicNum(pg.from_ayah)} إلى ${toArabicNum(pg.to_ayah)}`;

  const sIdx = soarNames.indexOf(pg.from_sura);
  if (sIdx !== -1) document.getElementById('suraSelect').value = sIdx;

  document.getElementById('prevPage').disabled = pageIdx === 0;
  document.getElementById('nextPage').disabled = pageIdx === pages.length - 1;

  renderWords();
  updateProgress();
}

function renderWords() {
  const container = document.getElementById('ayatContainer');
  container.innerHTML = '';

  words.forEach((w, idx) => {
    const span = document.createElement('span');
    if (w.isMarker) {
      span.className = 'ayah-marker';
      span.textContent = ' ' + w.display + ' ';
    } else {
      span.className = 'word';
      span.dataset.index = idx;
      span.textContent = (showTashkeel ? w.display : w.norm || w.display) + ' ';
      if (idx < currentIndex) span.classList.add('done');
      if (idx === currentIndex) {
        span.classList.add('current');
        setTimeout(() => span.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
      }
      if (hideWords && idx > currentIndex) span.style.visibility = 'hidden';
    }
    container.appendChild(span);
  });
}

function updateProgress() {
  const total = words.filter(w => !w.isMarker).length;
  const pct = total > 0 ? Math.max(0, currentIndex + 1) / total * 100 : 0;
  document.getElementById('progressFill').style.width = pct + '%';
}

// ── Speech recognition ──
let suppressEndUI = false;

function startRecognition() {
  if (!SpeechRecognition) {
    alert('المتصفح لا يدعم التعرف على الكلام. استخدم Chrome أو Edge.');
    return;
  }
  if (recognizer) return;

  recognizer = new SpeechRecognition();
  recognizer.lang = 'ar-SA';
  recognizer.interimResults = true;
  recognizer.continuous = true;

  const pill = document.getElementById('statusPill');
  const btn  = document.getElementById('startBtn');

  recognizer.onstart = () => {
    pill.textContent = '🎙 يستمع...';
    pill.className = 'status-pill active';
    btn.classList.add('listening');
    btn.textContent = '🎙 يستمع...';
  };
  recognizer.onerror = e => {
    pill.textContent = 'خطأ: ' + (e.error || '');
    pill.className = 'status-pill error';
  };
  recognizer.onend = () => {
    if (suppressEndUI) { suppressEndUI = false; return; }
    pill.textContent = 'متوقف';
    pill.className = 'status-pill';
    btn.classList.remove('listening');
    btn.textContent = '🎤 ابدأ التلاوة';
  };
  recognizer.onresult = (e) => {
    let transcript = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      transcript += e.results[i][0].transcript + ' ';
    }
    const said = transcript.trim();
    if (said) checkMatch(said);
  };

  recognizer.start();
}

function stopRecognition(silent = false) {
  if (recognizer) {
    if (silent) suppressEndUI = true;
    recognizer.stop();
    recognizer = null;
  }
  if (!silent) {
    currentIndex = -1;
    renderWords();
    updateProgress();
    const pill = document.getElementById('statusPill');
    pill.textContent = 'جاهز';
    pill.className = 'status-pill';
    const btn = document.getElementById('startBtn');
    btn.classList.remove('listening');
    btn.textContent = '🎤 ابدأ التلاوة';
  }
}

// ── Matching ──
function checkMatch(spoken) {
  const spokenWords = spoken.trim().split(/\s+/);
  const lastWord = spokenWords[spokenWords.length - 1];
  if (!lastWord) return;

  const spokenNorm = normalizeAr(lastWord);
  if (!spokenNorm) return;

  // real words only (no markers)
  const realWords = words
    .map((w, i) => ({ ...w, i }))
    .filter(w => !w.isMarker);

  if (currentIndex === -1) {
    for (const w of realWords) {
      const wn = getWordNorm(w);
      if (wn === spokenNorm || wn.startsWith(spokenNorm)) {
        currentIndex = w.i;
        renderWords();
        updateProgress();
        return;
      }
    }
    return;
  }

  const curPos = realWords.findIndex(w => w.i === currentIndex);

  // تقدم — ابحث في أول 2 كلمات قدام
  for (let p = curPos + 1; p <= Math.min(realWords.length - 1, curPos + 2); p++) {
    const w = realWords[p];
    if (w) {
      const wn = getWordNorm(w);
      if (wn === spokenNorm || wn.startsWith(spokenNorm)) {
        currentIndex = w.i;
        renderWords();
        updateProgress();
        // لو دي آخر كلمة في الصفحة، انتقل للصفحة اللي بعدها
        if (p === realWords.length - 1 && currentPage < pages.length - 1) {
          setTimeout(() => {
            const wasListening = !!recognizer;
            renderPage(currentPage + 1, wasListening);
            if (wasListening) startRecognition();
          }, 800);
        }
        return;
      }
    }
  }

  for (let p = curPos - 1; p >= Math.max(0, curPos - 2); p--) {
    const w = realWords[p];
    if (w) {
      const wn = getWordNorm(w);
      if (wn === spokenNorm || wn.startsWith(spokenNorm)) {
        currentIndex = w.i;
        renderWords();
        updateProgress();
        return;
      }
    }
  }
}

// ── Events ──
document.getElementById('startBtn').onclick = startRecognition;
document.getElementById('stopBtn').onclick = () => stopRecognition();
document.getElementById('prevPage').onclick = () => renderPage(currentPage - 1);
document.getElementById('nextPage').onclick = () => renderPage(currentPage + 1);
document.getElementById('tashkeelToggle').onchange = function() {
  showTashkeel = this.checked;
  renderWords();
};
document.getElementById('hideToggle').onchange = function() {
  hideWords = this.checked;
  renderWords();
};

loadData();
</script>
</body>
</html>
